{% extends "base.html" %}
{% block title %}Formulário de Categoria{% endblock %}
{% block content %}
<div class="container mt-4">
    <form class="col-md-6 offset-md-3" method="POST" action="">
        {% csrf_token %}
        <h3>{% if categoria %}Editar{% else %}Nova{% endif %} Categoria</h3>
        
        {% if message %}
            <div class="alert alert-{{ message.type }}">{{ message.text }}</div>
        {% endif %}
        
        <div class="form-group mb-3">
            <label class="font-weight-bold">Nome da Categoria</label>
            <input type="text" name="Nome" class="form-control" value="{{ categoria.Nome|default:'' }}">
        </div>
        
        <button type="submit" class="btn btn-success btn-block">Salvar</button>
        <a href="{% url 'list_categoria' %}" class="btn btn-secondary btn-block">Cancelar</a>
    </form>
</div>
{% endblock %}
