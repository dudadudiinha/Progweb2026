{% extends "base.html" %}
{% load static %}

{% block title %}Detalhes do Produto{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{% static 'css/home.css' %}">
{% endblock %}

{% block content %}
<div id="content">
    <div class="container mt-3">
        <div class="row mb-4">
            <div class="col-md-12">
                <h2>Detalhes do Produto</h2>
                <hr>
            </div>
        </div>

        <div class="form-group row mb-3">
            <label class="col-md-2 col-form-label font-weight-bold">Produto</label>
            <div class="col-md-6">
                <input type="text" class="form-control" value="{{ produto.Produto }}" disabled>
            </div>
        </div>

        <div class="form-group row mb-2">
            <div class="col-md-6 offset-md-2">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" {% if produto.destaque %}checked{% endif %} disabled>
                    <label class="form-check-label">Destaque</label>
                </div>
            </div>
        </div>

        <div class="form-group row mb-3">
            <div class="col-md-6 offset-md-2">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" {% if produto.promocao %}checked{% endif %} disabled>
                    <label class="form-check-label">Promoção</label>
                </div>
            </div>
        </div>

        <div class="form-group row mb-3">
            <label class="col-md-2 col-form-label font-weight-bold">Msg Promoção</label>
            <div class="col-md-6">
                <input type="text" class="form-control" value="{{ produto.msgPromocao|default:"" }}" disabled>
            </div>
        </div>

        <div class="form-group row mb-3">
            <label class="col-md-2 col-form-label font-weight-bold">Categorias</label>
            <div class="col-md-6">
                <select class="form-control" disabled>
                    <option>{{ produto.categoria.Categoria|default:"-----" }}</option>
                </select>
            </div>
        </div>

        <div class="form-group row mb-4">
            <label class="col-md-2 col-form-label font-weight-bold">Fabricantes</label>
            <div class="col-md-6">
                <select class="form-control" disabled>
                    <option>{{ produto.fabricante.Fabricante|default:"-----" }}</option>
                </select>
            </div>
        </div>

        <div class="form-group row mb-4">
            <label class="col-md-2 col-form-label font-weight-bold">Imagem Atual</label>
            <div class="col-md-6">
                {% if produto.image %}
                    <div class="border d-inline-block p-3 bg-white rounded shadow-sm">
                        <img src="{{ produto.image.url }}" alt="{{ produto.Produto }}" class="img-fluid" style="max-height: 150px;">
                    </div>
                {% else %}
                    <div class="border d-inline-block p-3 bg-white rounded shadow-sm">
                        <img src="{% static 'images/sem-foto.png' %}" alt="Sem foto" class="img-fluid" style="max-height: 150px;">
                    </div>
                {% endif %}
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 offset-md-2 d-flex gap-2">
                <a href="{% url 'produto' %}" class="btn btn-secondary text-white">
                    <i class="fa fa-rotate-left"></i> Retornar
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/home.js' %}"></script>
{% endblock %}
