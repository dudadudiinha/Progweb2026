{% extends "base.html" %}
{% load static %}

{% block title %}Novo Produto{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{% static 'css/home.css' %}">
{% endblock %}

{% block content %}
<div id="content">
    <div class="container">
        <div class="row mb-4">
            <div class="col-md-12">
                <h2>Cadastrar Novo Produto</h2>
                <hr>
            </div>
        </div>

        <form method="POST" enctype="multipart/form-data" action="/produto/create">
            {% csrf_token %}

            <div class="form-group row mb-3">
                <label for="Produto" class="col-md-2 col-form-label font-weight-bold">Produto</label>
                <div class="col-md-6">
                    <input type="text" class="form-control" id="Produto" name="Produto" placeholder="Digite o nome do produto" required>
                </div>
            </div>

            <div class="form-group row mb-2">
                <div class="col-md-6 offset-md-2">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="destaque" name="destaque">
                        <label class="form-check-label" for="destaque">Destaque</label>
                    </div>
                </div>
            </div>

            <div class="form-group row mb-3">
                <div class="col-md-6 offset-md-2">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="promocao" name="promocao">
                        <label class="form-check-label" for="promocao">Promoção</label>
                    </div>
                </div>
            </div>

            <div class="form-group row mb-3">
                <label for="msgPromocao" class="col-md-2 col-form-label font-weight-bold">Msg Promoção</label>
                <div class="col-md-6">
                    <input type="text" class="form-control" id="msgPromocao" name="msgPromocao" placeholder="Ex: 20% de desconto de Black Friday">
                </div>
            </div>

            <div class="form-group row mb-3">
                <label for="preco" class="col-md-2 col-form-label font-weight-bold">Preço</label>
                <div class="col-md-3">
                    <input type="number" step="0.01" class="form-control" id="preco" name="preco" placeholder="0,00" required>
                </div>
            </div>

            <div class="form-group row mb-3">
                <label for="CategoriaFk" class="col-md-2 col-form-label font-weight-bold">Categoria</label>
                <div class="col-md-6">
                    <select class="form-control" name="CategoriaFk" id="CategoriaFk" required>
                        <option value="">Escolha uma Categoria...</option>
                        {% for cate in categorias %}
                            <option value="{{ cate.id }}">{{ cate.Categoria }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-group row mb-3">
                <label for="FabricanteFk" class="col-md-2 col-form-label font-weight-bold">Fabricante</label>
                <div class="col-md-6">
                    <select class="form-control" name="FabricanteFk" id="FabricanteFk" required>
                        <option value="">Escolha um Fabricante...</option>
                        {% for fabri in fabricantes %}
                            <option value="{{ fabri.id }}">{{ fabri.Fabricante }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-group row mb-4">
                <label for="image" class="col-md-2 col-form-label font-weight-bold">Imagem</label>
                <div class="col-md-6">
                    <input type="file" class="form-control-file" id="image" name="image">
                </div>
            </div>

            <div class="row text-white">
                <div class="col-md-6 offset-md-2 d-flex gap-2">
                    <button type="submit" class="btn btn-danger">
                        <i class="fa fa-check"></i> Inserir
                    </button>
                    <a href="{% url 'produto' %}" class="btn btn-secondary text-white">
                        <i class="fa fa-rotate-left"></i> Retornar
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/home.js' %}"></script>
{% endblock %}
